<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternador de Conteúdo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: black;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- O iframe que exibirá os conteúdos -->
    <iframe id="display-frame" allow="autoplay; encrypted-media" allowfullscreen></iframe>

    <script>
        const frame = document.getElementById('display-frame');
        
        // URLs dos conteúdos
        // Nota: Adicionamos o parâmetro "autoplay=1&mute=1" para garantir que o vídeo rode sozinho.
        const videoURL = "https://www.youtube.com/embed/LGYSLMCFOJU?autoplay=1&mute=1&playlist=LGYSLMCFOJU&loop=1";
        const siteURL = "https://www.google.com/search?q=tempo+agora&igu=1"; 

        // Tempos em milissegundos
        const tempoVideo = 30 * 60 * 1000; // 30 minutos
        const tempoSite = 1 * 60 * 1000;  // 1 minuto

        function carregarVideo() {
            frame.src = videoURL;
            console.log("Exibindo vídeo por 30 minutos...");
            setTimeout(carregarSite, tempoVideo);
        }

        function carregarSite() {
            frame.src = siteURL;
            console.log("Exibindo site por 1 minuto...");
            setTimeout(carregarVideo, tempoSite);
        }

        // Inicia o ciclo
        carregarVideo();
    </script>
</body>
</html>
